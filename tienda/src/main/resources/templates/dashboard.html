<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="font-bold text-xl">Tienda Online</h1>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">
        Cerrar sesión
    </button>
</nav>

<div class="p-8">
    <h2 class="text-2xl font-bold mb-6">Productos</h2>

    <div id="productos"
         class="grid grid-cols-1 md:grid-cols-3 gap-6">
    </div>
</div>

<script>
    async function cargarProductos() {
        const response = await fetch("/api/productos");
        const productos = await response.json();

        const container = document.getElementById("productos");
        container.innerHTML = "";

        productos.forEach(p => {
            container.innerHTML += `
                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="text-xl font-bold">${p.nombre}</h3>
                    <p class="text-gray-600">$${p.precio}</p>
                </div>
            `;
        });
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/login";
    }

    cargarProductos();
</script>

</body>
</html>
