<!DOCTYPE html>
<html>
<head>
    <title>Registro - Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Crear Cuenta</h2>

    <form id="registerForm" class="space-y-4">
        <input type="text" id="nombre"
               placeholder="Nombre"
               class="w-full p-3 border rounded-lg" required>

        <input type="email" id="email"
               placeholder="Correo"
               class="w-full p-3 border rounded-lg" required>

        <input type="password" id="password"
               placeholder="Contraseña"
               class="w-full p-3 border rounded-lg" required>

        <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            Registrarse
        </button>
    </form>

    <p class="text-center mt-4">
        ¿Ya tienes cuenta?
        <a href="/login" class="text-blue-600 font-semibold">Inicia sesión</a>
    </p>
</div>

<script src="/js/auth.js"></script>

</body>
</html>
